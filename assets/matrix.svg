<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" preserveAspectRatio="xMidYMid meet">
    <style>
        /* Matrix Regen Styles */
        .matrix-text {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            fill: #00ff00;
            writing-mode: vertical-rl;
            text-orientation: upright;
            white-space: nowrap;
            letter-spacing: 6px;
        }
        .mover { animation: lightPass infinite linear; }
        .speed-vfast { animation-duration: 2.8s; }
        .speed-fast  { animation-duration: 3.9s; }
        .speed-med   { animation-duration: 5.2s; }
        .speed-slow  { animation-duration: 7.0s; }
        .speed-vslow { animation-duration: 9.5s; }
        .del-1 { animation-delay: 0.0s; }
        .del-2 { animation-delay: 0.6s; }
        .del-3 { animation-delay: 1.3s; }
        .del-4 { animation-delay: 2.1s; }
        .del-5 { animation-delay: 3.0s; }
        .del-6 { animation-delay: 3.8s; }
        .del-7 { animation-delay: 4.6s; }
        .del-8 { animation-delay: 5.5s; }

        @keyframes lightPass {
            0%   { transform: translateY(-420px); }
            100% { transform: translateY(550px); }
        }

       /* Terminal Overlay */
.terminal-layer {
    animation: terminalFadeIn 1.2s ease-out both;
}

.terminal-window {
    fill: #020702;
    fill-opacity: 0.82;
    stroke: #00ff66;
    stroke-width: 1.2;
    filter: url(#terminal-glow);
}

.terminal-header {
    fill: #061406;
    fill-opacity: 0.94;
}

.terminal-title {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    fill: #7cff9b;
    opacity: 0.75;
}

.terminal-dot {
    opacity: 0.85;
}

.term-text {
    font-family: 'Courier New', monospace;
    font-size: 12.2px;
    fill: #ffffff;
    font-weight: bold;
}

.prompt {
    fill: #00ff66;
}

.command {
    fill: #eaffea;
}

.cursor-block {
    fill: #00ff66;
    animation: blink 1s step-end infinite;
}

.scanline {
    fill: #00ff66;
    opacity: 0.14;
    animation: scanMove 4.5s linear infinite;
}

@keyframes terminalFadeIn {
    0% {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes scanMove {
    0% {
        transform: translateY(0);
        opacity: 0.05;
    }
    50% {
        opacity: 0.18;
    }
    100% {
        transform: translateY(44px);
        opacity: 0.05;
    }
}
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
    
    <rect width="100%" height="100%" fill="#000" />
    
 

