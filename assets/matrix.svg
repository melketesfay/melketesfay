<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 110 800 280" width="100%" height="100%">
    <style>
        /* Matrix Regen Styles */
        .matrix-text {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            fill: #00ff00;
            writing-mode: vertical-rl;
            text-orientation: upright;
            white-space: nowrap;
            letter-spacing: 6px;
        }
        .mover { animation: lightPass infinite linear; }
        .speed-vfast { animation-duration: 2.8s; }
        .speed-fast  { animation-duration: 3.9s; }
        .speed-med   { animation-duration: 5.2s; }
        .speed-slow  { animation-duration: 7.0s; }
        .speed-vslow { animation-duration: 9.5s; }
        .del-1 { animation-delay: 0.0s; }
        .del-2 { animation-delay: 0.6s; }
        .del-3 { animation-delay: 1.3s; }
        .del-4 { animation-delay: 2.1s; }
        .del-5 { animation-delay: 3.0s; }
        .del-6 { animation-delay: 3.8s; }
        .del-7 { animation-delay: 4.6s; }
        .del-8 { animation-delay: 5.5s; }

        @keyframes lightPass {
            0%   { transform: translateY(-420px); }
            100% { transform: translateY(550px); }
        }

        /* Terminal Styles - Angepasste Größe für 800px Viewbox */
        .term-text {
            font-family: 'Courier New', monospace;
            font-size: 14.5px; 
            fill: #ffffff;
            font-weight: bold;
        }
        .prompt { fill: #00ff00; }
        .cursor {
            fill: #00ff00;
            animation: blink 1s step-end infinite; 
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
    
    <rect width="100%" height="100%" fill="#000" />
    
    <g id="terminal-layer">
        <text x="15" y="255" class="term-text">
            <tspan class="prompt">root@melketesfay:~#</tspan> nmap -v -sS -O 10.2.2.2 &amp;&amp; sshnuke 10.2.2.2 -rootpw="Z1ON0101"<tspan class="cursor">&#9608;</tspan>
        </text>
    </g>

