    <g id="terminal-layer" class="terminal-layer">
        <rect x="34" y="110" width="732" height="94" rx="10" class="terminal-window" />

        <rect x="34" y="110" width="732" height="26" rx="10" class="terminal-header" />
        <rect x="34" y="128" width="732" height="8" fill="#061406" opacity="0.94" />

        <circle cx="52" cy="123" r="4" fill="#ff5f56" class="terminal-dot" />
        <circle cx="66" cy="123" r="4" fill="#ffbd2e" class="terminal-dot" />
        <circle cx="80" cy="123" r="4" fill="#27c93f" class="terminal-dot" />

        <text x="400" y="127" text-anchor="middle" class="terminal-title">
            matrix://zion-terminal
        </text>

        <rect x="50" y="148" width="700" height="1.4" class="scanline" />

        <!-- Command 1: Trinity scan -->
        <g id="command-1" opacity="0">
            <animate attributeName="opacity"
                values="0;1;1;0;0"
                keyTimes="0;0.02;0.32;0.33;1"
                dur="12s"
                begin="0s"
                repeatCount="indefinite" />

            <text x="54" y="173" class="term-text">
                <tspan class="prompt">root@melketesfay:~#</tspan>
            </text>

            <g clip-path="url(#cmd1-clip)">
                <text x="202" y="173" class="term-text command" textLength="220" lengthAdjust="spacing">
                    nmap -v -sS -O 10.2.2.2
                </text>
            </g>

            <rect x="202" y="159" width="8" height="17" class="cursor-block">
                <animate attributeName="x"
                    values="202;202;424;424;202;202"
                    keyTimes="0;0.02;0.26;0.32;0.33;1"
                    dur="12s"
                    begin="0s"
                    repeatCount="indefinite" />
            </rect>
        </g>

        <!-- Command 2: Trinity SSH exploit homage -->
        <g id="command-2" opacity="0">
            <animate attributeName="opacity"
                values="0;1;1;0;0"
                keyTimes="0;0.02;0.32;0.33;1"
                dur="12s"
                begin="4s"
                repeatCount="indefinite" />

            <text x="54" y="173" class="term-text">
                <tspan class="prompt">root@melketesfay:~#</tspan>
            </text>

            <g clip-path="url(#cmd2-clip)">
                <text x="202" y="173" class="term-text command" textLength="318" lengthAdjust="spacing">
                    sshnuke 10.2.2.2 -rootpw=&quot;Z1ON0101&quot;
                </text>
            </g>

            <rect x="202" y="159" width="8" height="17" class="cursor-block">
                <animate attributeName="x"
                    values="202;202;522;522;202;202"
                    keyTimes="0;0.02;0.26;0.32;0.33;1"
                    dur="12s"
                    begin="4s"
                    repeatCount="indefinite" />
            </rect>
        </g>

        <!-- Command 3: Login after reset -->
        <g id="command-3" opacity="0">
            <animate attributeName="opacity"
                values="0;1;1;0;0"
                keyTimes="0;0.02;0.32;0.33;1"
                dur="12s"
                begin="8s"
                repeatCount="indefinite" />

            <text x="54" y="173" class="term-text">
                <tspan class="prompt">root@melketesfay:~#</tspan>
            </text>

            <g clip-path="url(#cmd3-clip)">
                <text x="202" y="173" class="term-text command" textLength="190" lengthAdjust="spacing">
                    ssh 10.2.2.2 -l root
                </text>
            </g>

            <rect x="202" y="159" width="8" height="17" class="cursor-block">
                <animate attributeName="x"
                    values="202;202;394;394;202;202"
                    keyTimes="0;0.02;0.26;0.32;0.33;1"
                    dur="12s"
                    begin="8s"
                    repeatCount="indefinite" />
            </rect>
        </g>
    </g>
