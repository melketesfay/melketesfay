        <text x="748" y="10" class="matrix-text">ዊቱስጀምንችብቭሽፋስድድድፍፕዊቱስጀምንችብቭሽፋስድፍድድ</text>
        <text x="766" y="10" class="matrix-text">ስጀምንችብቭሽፋስድፍድድድፍፕዊቱስጀምንችብቭሽፋስድፍድድ</text>
